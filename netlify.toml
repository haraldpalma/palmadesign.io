# netlify.toml — Palma Web Kit
# Astro static build + Netlify Forms (no backend) + cache/security headers.

[build]
  command = "npm run build"
  publish = "dist"

# --- HTTP headers ---
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), browsing-topics=()"
    # Tight CSP for the public site: only self + Google Analytics (consent-gated).
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.google-analytics.com https://*.googletagmanager.com; font-src 'self'; connect-src 'self' https://*.google-analytics.com https://*.analytics.google.com https://www.googletagmanager.com"

# Keystatic admin is a React SPA that talks to GitHub — it needs a looser policy.
# These more-specific rules override the site CSP above for the admin paths.
[[headers]]
  for = "/keystatic"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.githubusercontent.com; font-src 'self' data:; connect-src 'self' https://api.github.com https://github.com https://*.githubusercontent.com; worker-src 'self' blob:; child-src 'self' blob:"

[[headers]]
  for = "/keystatic/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.githubusercontent.com; font-src 'self' data:; connect-src 'self' https://api.github.com https://github.com https://*.githubusercontent.com; worker-src 'self' blob:; child-src 'self' blob:"

[[headers]]
  for = "/api/keystatic/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://api.github.com https://github.com"

# Long cache for fingerprinted assets (Astro hashes filenames)
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML never cached, so content edits go live immediately
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# --- Markdown twins: serve article markdown at /writing/<slug>.md ---
[[headers]]
  for = "/writing/*.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"

# --- Per-client extras (optional) ---
# Redirect alias domains to the primary (configure them as domain aliases in Netlify first):
# [[redirects]]
#   from = "https://example.at/*"
#   to = "https://example.com/:splat"
#   status = 301
#   force = true

# SPA-style fallback is NOT wanted — this is a static multi-page site. 404 handled by 404.astro.
